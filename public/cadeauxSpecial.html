<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="stylegift.css" />
    <link rel="stylesheet" href="style2.css" />
    <link rel="stylesheet" href="header.css" />
    <link rel="stylesheet" href="generals.css" />
    <link rel="stylesheet" href="footer.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      .maternite-section {
        border-bottom: solid 1px #e7e7e7;
        padding-bottom: 60px;
        background: url(https://i.pinimg.com/736x/b8/11/d2/b811d2d7e02574966bfba49b668ff2f6.jpg);
        background-size: cover;
        color: #ffffff;
        border-radius: 0 0 5px 5px;
      }
      p {
        text-align: justify;
        margin: 60px;
      }
      h3 {
        user-select: none;
        cursor: default;
      }
      h2 {
        text-align: center;
        color: rgb(107, 94, 60);
      }
    </style>
  </head>
  <body>
    <header class="navbar">
      <div class="menu" onclick="history.back()">←</div>
      <h3><strong>CADEAU SPECIAL</strong></h3>
      <div
        class="cart"
        onclick="location.href = 'cart.html'"
        style="cursor: pointer"
      >
        <i class="fa-solid fa-cart-shopping"></i>
        <span class="badge" id="cartCount"></span>
      </div>
    </header>

    <section class="maternite-section">
      <h2>Article, Coffrets, et Cadeau special</h2>

      <div class="product-grid" id="materniteProducts"></div>

      <div class="gift-custom">
        <p>
          Vous ne savez pas quoi choisir ? Décrivez-nous la famille, nous nous
          occupons du reste.
        </p>
        <a href="materniteRecommander.html" style="text-decoration: none">
          <button style="margin-left: 10px">
            Demander un cadeau recommandé
          </button>
        </a>
      </div>
    </section>
    <section class="products" id="productsContainer"></section>

    <script>
      function getCategoryClasses(product) {
        const classes = [];

        // Add main category
        if (product.category) {
          classes.push(product.category.toLowerCase());
        }

        if (product.type) {
          classes.push(product.type.toLowerCase());
        }

        if (product.options?.size) {
          product.options.size.forEach((size) => {
            classes.push(size.toLowerCase());
          });
        }

        if (product.options?.color) {
          product.options.color.forEach((color) => {
            classes.push(color.toLowerCase());
          });
        }

        return classes.join(" "); // <- this is OK here
      }

      fetch("/api/products")
        .then((res) => res.json())
        .then((products) => {
          const container = document.getElementById("productsContainer");
          Object.values(products)
            .filter((p) => p.category === "Femme") // filtrage par page
            .forEach((p) => {
              const div = document.createElement("div");
              div.className = `product details ${getCategoryClasses(p)}`;
              div.dataset.id = p.id;
              div.innerHTML = `
                <img src="${p.image}" alt="${p.name}" />
                <div class="info">
                  <h5>${p.name}</h5>
                  <div class="price">$${p.price}</div>
                  <button onclick="location.href='product.html?id=${p.id}'">Voir produit</button>
                </div>
              `;
              container.appendChild(div);
            });
        })
        .catch((error) => {
          console.error("Error fetching products:", error);
        });
    </script>
    <script src="cart.js"></script>
    <script src="filter.js"></script>
    <script src="cart-core.js"></script>
    <script src="product.js"></script>
    <script src="product-link.js"></script>
  </body>
</html>
